<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex FC - Escalação Oficial</title>
    <style>
        /* Cores Oficiais e Reset */
        :root {
            --bg-principal: #0b0711;
            --bg-card: #160f22;
            --roxo-neon: #8a2be2;
            --roxo-escuro: #4b0082;
            --texto-claro: #f5f5f7;
            --texto-mutado: #a0a0b0;
            --borda: #2a1b40;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* Cabeçalho */
        header {
            text-align: center;
            margin-bottom: 3rem;
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--borda);
            padding-bottom: 1.5rem;
        }

        .logo-area h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 30%, var(--roxo-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area p {
            color: var(--texto-mutado);
            font-size: 0.9rem;
            text-align: left;
        }

        /* Botões */
        .btn {
            background-color: transparent;
            color: var(--texto-claro);
            border: 1px solid var(--roxo-neon);
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--roxo-neon);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
        }

        .btn-danger {
            background-color: #3a1111;
            border-color: #ff4444;
            color: #ff8888;
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
        }

        .btn-danger:hover {
            background-color: #ff4444;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.4);
        }

        /* Conteúdo Principal */
        main {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Painel Administrativo (Escondido por padrão) */
        #admin-panel {
            display: none;
            background: linear-gradient(145deg, var(--bg-card), #1e1430);
            border: 1px dashed var(--roxo-neon);
            padding: 1.5rem;
            border-radius: 12px;
            animation: fadeIn 0.5s ease;
        }

        .panel-header {
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--borda);
            padding-bottom: 0.5rem;
            color: var(--roxo-neon);
        }

        form {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .form-group {
            flex: 1;
            min-width: 160px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--texto-mutado);
        }

        input, select {
            background-color: var(--bg-principal);
            border: 1px solid var(--borda);
            color: var(--texto-claro);
            padding: 0.6rem;
            border-radius: 6px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--roxo-neon);
        }

        /* Grid de Jogadores */
        .grid-jogadores {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .card-jogador {
            background-color: var(--bg-card);
            border: 1px solid var(--borda);
            border-radius: 10px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card-jogador:hover {
            transform: translateY(-5px);
            border-color: var(--roxo-neon);
        }

        .numero-camisa {
            position: absolute;
            right: -10px;
            bottom: -20px;
            font-size: 6rem;
            font-weight: 900;
            color: rgba(138, 43, 226, 0.05);
            z-index: 1;
        }

        .info-jogador {
            position: relative;
            z-index: 2;
        }

        .posicao {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--roxo-neon);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .nome {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .numero-display {
            font-size: 0.9rem;
            color: var(--texto-mutado);
        }

        .actions {
            margin-top: 1.5rem;
            display: none; /* Só aparece para o admin */
            position: relative;
            z-index: 3;
        }

        /* Feedback vazio */
        .sem-jogadores {
            text-align: center;
            color: var(--texto-mutado);
            padding: 3rem;
            border: 1px dashed var(--borda);
            border-radius: 10px;
            grid-column: 1 / -1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>Apex FC</h1>
            <p>Escalação Oficial</p>
        </div>
        <button class="btn" id="btn-login" onclick="autenticarAdmin()">Área do Dono</button>
    </header>

    <main>
        <section id="admin-panel">
            <h3 class="panel-header">Painel do Proprietário</h3>
            <form id="form-jogador" onsubmit="adicionarJogador(event)">
                <div class="form-group">
                    <label for="nome">Nome do Jogador</label>
                    <input type="text" id="nome" required placeholder="Ex: Neymar Jr">
                </div>
                <div class="form-group">
                    <label for="posicao">Posição</label>
                    <select id="posicao" required>
                        <option value="Goleiro">Goleiro</option>
                        <option value="Zagueiro">Zagueiro</option>
                        <option value="Lateral">Lateral</option>
                        <option value="Meio-Campo">Meio-Campo</option>
                        <option value="Atacante">Atacante</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="numero">Número da Camisa</label>
                    <input type="number" id="numero" required min="1" max="99" placeholder="10">
                </div>
                <div class="form-group" style="justify-content: flex-end; min-width: 100px;">
                    <button type="submit" class="btn" style="width: 100%;">Escalar</button>
                </div>
            </form>
        </section>

        <section>
            <div class="grid-jogadores" id="lista-jogadores">
                </div>
        </section>
    </main>

    <script>
        // E-mail master permitido
        const EMAIL_AUTORIZADO = "boratoferreiraandreluis@gmail.com";
        let isAdmin = false;

        // Banco de dados simulado no LocalStorage
        let jogadores = JSON.parse(localStorage.getItem('escalacao_apex')) || [];

        // Renderiza a lista de jogadores na tela
        function renderizarJogadores() {
            const container = document.getElementById('lista-jogadores');
            container.innerHTML = '';

            if (jogadores.length === 0) {
                container.innerHTML = `<div class="sem-jogadores">Nenhum jogador escalado no momento.</div>`;
                return;
            }

            // Ordena por posição para ficar organizado
            const ordemPosicoes = { "Goleiro": 1, "Zagueiro": 2, "Lateral": 3, "Meio-Campo": 4, "Atacante": 5 };
            jogadores.sort((a, b) => ordemPosicoes[a.posicao] - ordemPosicoes[b.posicao]);

            jogadores.forEach((jog, index) => {
                const card = document.createElement('div');
                card.className = 'card-jogador';
                card.innerHTML = `
                    <div class="numero-camisa">${jog.numero}</div>
                    <div class="info-jogador">
                        <div class="posicao">${jog.posicao}</div>
                        <div class="nome">${jog.nome}</div>
                        <div class="numero-display">Nº ${jog.numero}</div>
                    </div>
                    <div class="actions" style="display: ${isAdmin ? 'block' : 'none'}">
                        <button class="btn btn-danger" onclick="removerJogador(${index})">Remover</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Função de Validação de E-mail
        function autenticarAdmin() {
            if (isAdmin) {
                // Se já for admin, clica para sair
                isAdmin = false;
                document.getElementById('admin-panel').style.display = 'none';
                document.getElementById('btn-login').innerText = 'Área do Dono';
                renderizarJogadores();
                return;
            }

            const emailInformado = prompt("Digite seu e-mail para acessar o painel de gerenciamento:");
            
            if (emailInformado === null) return; // Cancelou o prompt

            if (emailInformado.trim().toLowerCase() === EMAIL_AUTORIZADO) {
                isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('btn-login').innerText = 'Sair do Modo Admin';
                alert("Acesso concedido. Bem-vindo de volta, Chefe!");
                renderizarJogadores(); // Recarrega para mostrar botões de apagar
            } else {
                alert("Acesso negado. Apenas o proprietário autorizado pode modificar a escalação.");
            }
        }

        // Adicionar jogador
        function adicionarJogador(event) {
            event.preventDefault();
            
            if (!isAdmin) {
                alert("Ação não autorizada.");
                return;
            }

            const nome = document.getElementById('nome').value;
            const posicao = document.getElementById('posicao').value;
            const numero = document.getElementById('numero').value;

            const novoJogador = { nome, posicao, numero };
            jogadores.push(novoJogador);
            
            // Salva e atualiza a tela
            localStorage.setItem('escalacao_apex', JSON.stringify(jogadores));
            renderizarJogadores();

            // Limpa o formulário
            document.getElementById('form-jogador').reset();
        }

        // Remover jogador
        function removerJogador(index) {
            if (!isAdmin) return;
            
            if (confirm(`Remover ${jogadores[index].nome} da escalação?`)) {
                jogadores.splice(index, 1);
                localStorage.setItem('escalacao_apex', JSON.stringify(jogadores));
                renderizarJogadores();
            }
        }

        // Inicialização automática
        renderizarJogadores();
    </script>
</body>
</html>
